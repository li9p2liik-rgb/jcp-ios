name: Build iOS IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      sign_with_certificate:
        description: 'Sign IPA with certificate (requires secrets)'
        required: false
        default: false
        type: boolean

env:
  PROJECT_NAME: JCP
  SCHEME: JCP

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd "${{ github.workspace }}"
          xcodegen generate --spec project.yml
          echo "Xcode project generated successfully"
          ls -la JCP.xcodeproj/

      - name: Archive app (unsigned)
        if: ${{ !inputs.sign_with_certificate }}
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration ${{ inputs.build_configuration || 'Release' }} \
            -archivePath build/"${{ env.PROJECT_NAME }}".xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer

      - name: Archive app (signed)
        if: ${{ inputs.sign_with_certificate }}
        run: |
          # Import certificate and provisioning profile
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i profile.mobileprovision))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration ${{ inputs.build_configuration || 'Release' }} \
            -archivePath build/"${{ env.PROJECT_NAME }}".xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            -quiet
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer

      - name: Export unsigned IPA
        if: ${{ !inputs.sign_with_certificate }}
        run: |
          mkdir -p build/Payload
          cp -R build/"${{ env.PROJECT_NAME }}".xcarchive/Products/Applications/"${{ env.PROJECT_NAME }}".app build/Payload/
          cd build
          zip -r "${{ env.PROJECT_NAME }}-unsigned.ipa" Payload/
          cd ..
          echo "Unsigned IPA created at build/${{ env.PROJECT_NAME }}-unsigned.ipa"

      - name: Export signed IPA
        if: ${{ inputs.sign_with_certificate }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/"${{ env.PROJECT_NAME }}".xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist
          mv build/export/"${{ env.PROJECT_NAME }}".ipa build/"${{ env.PROJECT_NAME }}-signed.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.build_configuration || 'Release' }}
          path: build/${{ env.PROJECT_NAME }}-*.ipa
          retention-days: 7
          compression-level: 6

      - name: Upload xcarchive artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-xcarchive
          path: build/${{ env.PROJECT_NAME }}.xcarchive
          retention-days: 3
