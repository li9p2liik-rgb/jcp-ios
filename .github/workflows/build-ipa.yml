name: Build iOS IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PROJECT_NAME: JCP
  SCHEME: JCP

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Xcode versions
        run: ls /Applications/Xcode*.app

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Show Xcode path
        run: xcode-select -p && xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew install xcodegen 2>&1 || echo "Brew install failed, trying gem..."
          which xcodegen || gem install xcodegen
          xcodegen --version

      - name: Show project structure
        run: |
          echo "=== project.yml ==="
          cat project.yml
          echo ""
          echo "=== Files ==="
          find JCP -name "*.swift" | sort

      - name: Generate Xcode project
        run: |
          cd "${{ github.workspace }}"
          xcodegen generate --spec project.yml --use-cache 2>&1
          echo "Exit code: $?"
          ls -la JCP.xcodeproj/ 2>&1 || echo "No xcodeproj generated!"

      - name: Build archive (Debug first to catch errors)
        run: |
          xcodebuild build \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50

      - name: Archive app
        if: success()
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath build/"${{ env.PROJECT_NAME }}".xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES 2>&1 | tail -50

      - name: Create unsigned IPA
        if: success()
        run: |
          mkdir -p build/Payload
          cp -R build/"${{ env.PROJECT_NAME }}".xcarchive/Products/Applications/"${{ env.PROJECT_NAME }}".app build/Payload/
          cd build
          zip -r "${{ env.PROJECT_NAME }}-unsigned.ipa" Payload/
          ls -la "${{ env.PROJECT_NAME }}-unsigned.ipa"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JCP-Release
          path: build/${{ env.PROJECT_NAME }}-unsigned.ipa
          retention-days: 7
