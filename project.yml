name: JCP
options:
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

targets:
  JCP:
    type: application
    platform: iOS
    sources:
      - path: JCP
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jcp.app
        INFOPLIST_FILE: JCP/Resources/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    info:
      path: JCP/Resources/Info.plist
