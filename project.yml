name: JCP
options:
  bundleIdPrefix: com.jcp
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  JCP:
    type: application
    platform: iOS
    sources:
      - path: JCP
    settings:
      base:
        INFOPLIST_FILE: JCP/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jcp.app
        PRODUCT_NAME: JCP
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    info:
      path: JCP/Resources/Info.plist
    dependencies: []

  JCPTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - JCPTests
    dependencies:
      - target: JCP
    settings:
      base:
        INFOPLIST_FILE: JCP/Resources/Info.plist
