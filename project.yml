name: jcp-ios
options:
  bundleIdPrefix: com.jcp
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  jcp-ios:
    type: application
    platform: iOS
    sources:
      - path: jcp-ios
        type: group
        createIntermediateGroups: true
    info:
      path: jcp-ios/Resources/Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: jcp-ios/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jcp.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
