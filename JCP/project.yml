name: JCP
options:
  bundleIdPrefix: com.jcp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  JCP:
    type: application
    platform: iOS
    sources:
      - path: JCP
    settings:
      base:
        INFOPLIST_FILE: JCP/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jcp.app
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
    preBuildScripts: []

  JCPTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JCPTests
    dependencies:
      - target: JCP
